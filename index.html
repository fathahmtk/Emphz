<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMPHZ Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      .timeline-item {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }
      .timeline-item.is-visible {
        opacity: 1;
        transform: translateY(0);
      }
      /* Success Animation Styles */
      .success-animation-svg {
          width: 80px;
          height: 80px;
          display: block;
          margin: 0 auto 1rem;
      }
      .success-animation-circle {
          stroke-dasharray: 166;
          stroke-dashoffset: 166;
          stroke-width: 4;
          stroke-miterlimit: 10;
          stroke: #C9A227; /* accent color */
          fill: none;
          animation: draw-circle 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
      }
      .success-animation-checkmark {
          stroke-dasharray: 48;
          stroke-dashoffset: 48;
          stroke-width: 5;
          stroke-linecap: round;
          stroke-miterlimit: 10;
          stroke: #C9A227; /* accent color */
          fill: none;
          animation: draw-checkmark 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.6s forwards;
      }
      @keyframes draw-circle {
          to {
              stroke-dashoffset: 0;
          }
      }
      @keyframes draw-checkmark {
          to {
              stroke-dashoffset: 0;
          }
      }
       @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-10px); }
          100% { transform: translateY(0px); }
      }
      .cta-glow:hover {
        animation: pulse-glow 2s ease-in-out infinite;
      }
      @keyframes pulse-glow {
        0%, 100% {
          box-shadow: 0 0 7px rgba(201, 162, 39, 0.5);
        }
        50% {
          box-shadow: 0 0 15px rgba(201, 162, 39, 0.8);
        }
      }
      /* Page Transition Animation */
      @keyframes page-enter {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .page-transition {
        animation: page-enter 0.4s ease-out forwards;
      }

      .pattern-bg {
        background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.08) 1px, transparent 0);
        background-size: 25px 25px;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#0B3D91', // Deep Blue
                medium: '#1E4A9B', 
                dark: '#072C6B',
              },
              accent: {
                DEFAULT: '#C9A227',  // Gold
                hover: '#B8921A',   
                light: '#FBF5E1', 
              },
              text: {
                DEFAULT: '#1e293b', // slate-800
                secondary: '#64748b', // slate-500
              },
              background: {
                DEFAULT: '#FFFFFF',
                light: '#F7F8FA',
              },
              border: '#E2E8F0', // slate-200
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Poppins', 'sans-serif'],
              arabic: ['Tajawal', 'sans-serif'],
            },
            letterSpacing: {
              tight: '-0.025em',
              tighter: '-0.05em',
            },
            animation: {
                'gradient-xy': 'gradient-xy 15s ease infinite',
                'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
                'gradient-xy': {
                    '0%, 100%': {
                        'background-size': '400% 400%',
                        'background-position': 'left center'
                    },
                    '50%': {
                        'background-size': '200% 200%',
                        'background-position': 'right center'
                    }
                },
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.546.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.4"
  }
}
</script>
</head>
  <body class="bg-background-light font-sans text-text-DEFAULT">

    <script src="/emphz_global.js"></script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
