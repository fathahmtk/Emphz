<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMPHZ Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      .timeline-item {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }
      .timeline-item.is-visible {
        opacity: 1;
        transform: translateY(0);
      }
       @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-10px); }
          100% { transform: translateY(0px); }
      }
      .cta-glow:hover {
        animation: pulse-glow 2s ease-in-out infinite;
      }
      @keyframes pulse-glow {
        0%, 100% {
          box-shadow: 0 0 8px rgba(74, 130, 102, 0.3), 0 0 16px rgba(74, 130, 102, 0.2);
        }
        50% {
          box-shadow: 0 0 16px rgba(74, 130, 102, 0.5), 0 0 32px rgba(74, 130, 102, 0.3);
        }
      }
      /* Page Transition Animation */
      @keyframes page-enter {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .page-transition {
        animation: page-enter 0.4s ease-out forwards;
      }

      .pattern-bg {
        background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.08) 1px, transparent 0);
        background-size: 25px 25px;
      }
      
      /* Toast Notification Animation */
      @keyframes toast-in {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      .toast-item {
        animation: toast-in 0.5s ease-out forwards;
      }

      @keyframes bounce {
        0%, 100% {
          transform: translateY(-25%);
          animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
        }
        50% {
          transform: translateY(0);
          animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
        }
      }
      .animate-bounce-slow {
        animation: bounce 2s infinite;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              graphite: '#1A1C1F',
              teal: '#00979F',
              silver: '#BAC5B3',
              'neon-green': '#4A8266',
              
              text: {
                DEFAULT: '#1A1C1F', // Graphite
                secondary: '#52525b', // zinc-600
              },
              background: {
                DEFAULT: '#FFFFFF',
                light: '#F7F8FA',
              },
              border: '#E2E8F0', // slate-200
              success: '#10B981', 
              warning: '#F59E0B', 
              danger: '#EF4444', 
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              heading: ['Orbitron', 'sans-serif'],
              arabic: ['Tajawal', 'sans-serif'],
            },
             fontSize: {
              'xs': '.75rem',
              'sm': '.875rem',
              'base': '1rem', // 16px
              'lg': '1.125rem',
              'xl': '1.25rem',
              '2xl': '1.5rem',
              '3xl': '1.875rem',
              '4xl': '2.5rem',
              '5xl': '3.25rem',
              '6xl': '4rem',
              '7xl': '5rem',
            },
            letterSpacing: {
              tight: '-0.025em',
              tighter: '-0.05em',
            },
            animation: {
                'gradient-xy': 'gradient-xy 15s ease infinite',
                'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
                'gradient-xy': {
                    '0%, 100%': {
                        'background-size': '400% 400%',
                        'background-position': 'left center'
                    },
                    '50%': {
                        'background-size': '200% 200%',
                        'background-position': 'right center'
                    }
                },
            }
          }
        }
      }
    </script>
